name: IaC Scanning

# -------------------------------------------------------
# DEMO: I — IaC Scanning
#
# Uses microsoft/security-devops-action with Template Analyzer
# (Microsoft-built, open-source) to scan Bicep/ARM files for
# misconfigurations and report findings to GHAS Code Scanning
# via SARIF. No third-party tools required.
#
# Beat 1 — The misconfigured Bicep file is at infra/storage.bicep
#   It contains three deliberate misconfigurations:
#     - publicNetworkAccess: 'Enabled'
#     - allowBlobPublicAccess: true
#     - minimumTlsVersion: 'TLS1_0'
#
# Beat 2 — This workflow fires on push/PR when infra/ changes.
#   Walk through this file and explain the permissions and steps.
#
# Beat 3 — After pushing, go to Security → Code scanning alerts
#   to show the three findings surfaced by Template Analyzer.
#
# Beat 4 — Fix the three properties in infra/storage.bicep,
#   push → scan reruns → alerts close automatically.
# -------------------------------------------------------

on:
  push:
    branches:
      - main
      - "feature/**"
    paths:
      - "infra/**"
  pull_request:
    paths:
      - "infra/**"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write    # required to upload SARIF to GHAS Code Scanning

jobs:
  iac-scan:
    name: Scan IaC (Template Analyzer)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # microsoft/security-devops-action runs Template Analyzer for
      # Bicep and ARM templates when categories is set to 'IaC'.
      # It writes findings to a SARIF file at ${{ runner.temp }}/msdo.sarif
      - name: Run Microsoft Security DevOps — Template Analyzer
        uses: microsoft/security-devops-action@v1
        id: msdo
        with:
          categories: IaC

      # Upload the SARIF results to GHAS Code Scanning.
      # Findings appear under Security → Code scanning alerts
      # with file path, line number, severity, and rule description —
      # identical UX to CodeQL findings.
      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .gdn/msdo.sarif
